name: Build & Test
# Note: docs-only PRs (markdown / media changes) skip these jobs via
# `paths-ignore`. If branch-protection rules require `lint`/`test` as
# checks, those PRs end up BLOCKED with no checks ever running.
# The proper fix is a status-check shim workflow emitting matching job
# names with `success` for the same paths — until that lands, docs PRs
# need an admin-merge or a no-op non-md commit (like this one) to nudge
# CI into running. (PR #1442 — Capacitor icon — needed this nudge.)
on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'media/**'
      - 'packages/melonjs/DOC_README.md'
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '*.md'
      - 'media/**'
      - 'packages/melonjs/DOC_README.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm i
      - run: pnpm lint
      - run: pnpm biome check
      - run: pnpm build

  test:
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm i
      - run: pnpm test

  # Windows build — only on master push, not on PRs
  windows:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: pnpm i
      - run: pnpm lint
      - run: pnpm build

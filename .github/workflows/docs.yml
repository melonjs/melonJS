name: Documentation & Examples
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm i
      - name: Build API docs
        run: pnpm doc
      - name: Build examples
        run: pnpm -F examples build
        env:
          VITE_BASE_PATH: /melonJS/examples/
      - name: Combine docs and examples
        run: |
          mkdir -p packages/melonjs/docs/examples
          cp -r packages/examples/dist/* packages/melonjs/docs/examples/
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/melonjs/docs/
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: api-reference
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

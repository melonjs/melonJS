<!DOCTYPE html>
<html>
<head><title>Generate Blend Mode Images</title></head>
<body>
<p id="status">Generating images...</p>
<script>
const MODES = [
	"normal", "add", "multiply", "screen", "overlay",
	"darken", "lighten", "color-dodge", "color-burn",
	"hard-light", "soft-light", "difference", "exclusion"
];
const ALIASES = { add: "lighter" };
const W = 180, H = 140, R = 45;

async function generate() {
	for (const mode of MODES) {
		const canvas = document.createElement("canvas");
		canvas.width = W;
		canvas.height = H;
		const ctx = canvas.getContext("2d");

		// dark background
		ctx.fillStyle = "#1a1a2e";
		ctx.fillRect(0, 0, W, H);

		const cx = W / 2, cy = H / 2 - 8;

		// blue circle (base)
		ctx.globalCompositeOperation = "source-over";
		ctx.globalAlpha = 1.0;
		ctx.fillStyle = "#2266dd";
		ctx.beginPath();
		ctx.ellipse(cx - R * 0.35, cy - R * 0.2, R, R, 0, 0, Math.PI * 2);
		ctx.fill();

		// red circle (blend)
		ctx.globalCompositeOperation = ALIASES[mode] || mode;
		ctx.globalAlpha = 0.85;
		ctx.fillStyle = "#dd4422";
		ctx.beginPath();
		ctx.ellipse(cx + R * 0.35, cy + R * 0.2, R, R, 0, 0, Math.PI * 2);
		ctx.fill();

		// label
		ctx.globalCompositeOperation = "source-over";
		ctx.globalAlpha = 1.0;
		ctx.fillStyle = "#ffffff";
		ctx.font = "14px Arial";
		ctx.textAlign = "center";
		ctx.fillText(mode, cx, H - 10);

		// download
		const link = document.createElement("a");
		link.download = mode + "-blendmode.png";
		link.href = canvas.toDataURL("image/png");
		link.click();

		// small delay between downloads
		await new Promise(r => setTimeout(r, 300));
	}
	document.getElementById("status").textContent = "Done! " + MODES.length + " images downloaded.";
}
generate();
</script>
</body>
</html>
